<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournament Bracket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>🏆 Tournament Generator</h1>
        
        <div id="setup-card" class="card">
            <h2>Spelers Toevoegen</h2>
            <p class="subtitle">Voer 3 tot 16 namen in (gescheiden door komma's)</p>
            <textarea id="player-input" placeholder="Naam 1, Naam 2, Naam 3, Naam 4..."></textarea>
            <button id="start-btn" onclick="startTournament()">Start Toernooi</button>
        </div>

        <div id="bracket-card" class="card hidden">
            <div class="bracket-header">
                <h2>Toernooi Schema</h2>
                <button class="reset-btn" onclick="resetTournament()">Nieuw Toernooi</button>
            </div>
            <div id="rounds-container" class="rounds-container"></div>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
