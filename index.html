<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tournament Bracket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <h1 id="main-title">Tournament Generator</h1>
            <div class="header-glow"></div>
        </header>
        
        <div id="game-card" class="card fade-in">
            <h2>Kies je Game</h2>
            <p class="subtitle">Selecteer de modus voor je toernooi</p>
            
            <div class="game-options">
                <button class="game-btn polytopia" onclick="kiesGame('Polytopia')">
                    <span class="game-icon">👑</span>
                    <div class="game-btn-text">
                        <span class="game-name">Polytopia Toernooi</span>
                        <span class="game-desc">Best of 3 • Interactieve game tracker</span>
                    </div>
                </button>
                
                <button class="game-btn rollorush" onclick="kiesGame('Rollo Rush')">
                    <span class="game-icon">🦔</span>
                    <div class="game-btn-text">
                        <span class="game-name">Rollo Rush Mode</span>
                        <span class="game-desc">Scorebord • Wie rolt de verste afstand?</span>
                    </div>
                </button>
                
                <button class="game-btn normal" onclick="kiesGame('Normaal')">
                    <span class="game-icon">⚔️</span>
                    <div class="game-btn-text">
                        <span class="game-name">Normale Bracket</span>
                        <span class="game-desc">Klassiek • Directe uitschakeling</span>
                    </div>
                </button>
            </div>
        </div>
        
        <div id="setup-card" class="card hidden fade-in">
            <div class="card-header">
                <h2>Spelers Selecteren</h2>
                <button class="back-btn" onclick="terugNaarMenu()">⬅ Menu</button>
            </div>
            <p class="subtitle">Klik op je vrienden of voeg anderen toe (3-16 spelers)</p>
            
            <div id="friends-container" class="friends-grid"></div>

            <div class="custom-add-container">
                <input type="text" id="custom-player-input" placeholder="Andere naam toevoegen...">
                <button class="add-btn" onclick="voegExtraSpelerToe()">+</button>
            </div>

            <p class="player-count-text">Geselecteerd: <strong id="speler-teller">0</strong></p>

            <button id="start-btn" class="primary-btn" onclick="startTournament()">Start Toernooi</button>
        </div>

        <div id="bracket-card" class="card hidden fade-in">
            <div class="bracket-header">
                <h2 id="bracket-title">Toernooi Schema</h2>
                <button class="reset-btn" onclick="resetTournament()">Nieuw Toernooi</button>
            </div>
            <div id="rounds-container" class="rounds-container"></div>
        </div>
    </div>

    <div id="winner-overlay" class="overlay hidden">
        <div class="winner-card">
            <div class="confetti">🎉🥳🎉🥳🎉</div>
            <h2>WE HEBBEN EEN WINNAAR!</h2>
            <div class="champion-badge">
                <span class="big-crown">👑</span>
                <h1 id="champion-name">NAAM</h1>
            </div>
            <p id="winner-text">Gefeliciteerd!</p>
            <button class="celebrate-btn" onclick="sluitWinnaarPopup()">Bekijk Bracket</button>
            <button class="restart-btn" onclick="resetTournament()">Nieuw Toernooi</button>
        </div>
    </div>

    <script src="script.js?v=15"></script>
</body>
</html>
